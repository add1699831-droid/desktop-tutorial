<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="木吉他和弦查詢器（最小可運作版）：支援 Major / Minor / 7 / m7 / sus2 / sus4。" />
  <title>木吉他和弦查詢器（MVP）</title>
  <style>
    :root {
      color-scheme: dark;
      --surface: #1c1a18;
      --surface-2: #27231f;
      --surface-3: #342d27;
      --text: #fff8ee;
      --muted: #c9bca9;
      --accent: #ffd166;
      --accent-2: #ff7a59;
      --green: #8fd694;
      --red: #ff8a80;
      --line: rgba(255, 255, 255, 0.16);
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 209, 102, 0.18), transparent 34rem),
        linear-gradient(135deg, #120f0d 0%, #1c1714 52%, #0c0b0a 100%);
      color: var(--text);
      line-height: 1.6;
    }

    main { width: min(100% - 24px, 1120px); margin: 0 auto; padding: 28px 0; }
    .hero { text-align: center; margin-bottom: 20px; }
    .hero p { color: var(--muted); margin: 6px 0 0; }
    h1 { margin: 0; font-size: clamp(1.8rem, 4vw, 2.8rem); }

    .app { display: grid; grid-template-columns: minmax(230px, 290px) 1fr; gap: 16px; }
    .panel, .card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(28, 26, 24, 0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .panel { padding: 16px; position: sticky; top: 14px; height: fit-content; }
    label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--muted); }
    select {
      width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--line);
      background: var(--surface-2); color: var(--text); font: inherit;
    }

    .legend { list-style: none; margin: 12px 0 0; padding: 0; display: grid; gap: 8px; color: var(--muted); }
    .legend span {
      display: inline-grid; place-items: center; width: 26px; height: 26px;
      border-radius: 999px; margin-right: 8px; font-weight: 800; color: #140f0d;
    }
    .pressed { background: var(--accent-2); color: #fff !important; }
    .open-string { background: var(--green); }
    .muted-string { background: var(--red); }

    .card-header {
      display: flex; justify-content: space-between; gap: 12px; padding: 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.14), rgba(255, 122, 89, 0.08));
    }

    .title { margin: 0; color: var(--accent); font-size: clamp(1.5rem, 4vw, 2.2rem); }
    .subtitle, .msg { margin: 4px 0 0; color: var(--muted); }
    .badge {
      align-self: start; padding: 7px 10px; border-radius: 999px;
      background: rgba(255, 209, 102, 0.16); color: var(--accent); font-weight: 800;
    }

    .card-body { display: grid; grid-template-columns: minmax(240px, 320px) 1fr; gap: 16px; padding: 18px; }
    .box {
      border: 1px solid var(--line); border-radius: 14px; background: rgba(255,255,255,0.03);
      padding: 12px; margin-bottom: 12px;
    }
    .box h3 { margin: 0 0 8px; font-size: .9rem; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; list-style: none; margin: 0; padding: 0; }
    .chip { background: var(--surface-3); border-radius: 999px; padding: 6px 10px; font-weight: 700; }
    .fingering { margin: 0; letter-spacing: .18em; font-size: 1.4rem; font-weight: 900; }

    .diagram-wrap { overflow-x: auto; }
    .strings { display: grid; grid-template-columns: repeat(6, 1fr); min-width: 300px; color: var(--muted); text-align: center; font-weight: 700; margin-bottom: 6px; }
    table { width: 100%; min-width: 300px; border-collapse: collapse; table-layout: fixed; background: #201b17; }
    td { width: 50px; height: 50px; border: 2px solid #76614f; text-align: center; vertical-align: middle; font-weight: 800; }
    tr:first-child td { height: 40px; border-top: 8px solid #c7a47a; background: rgba(255,255,255,.03); }

    .dot { display: inline-grid; width: 32px; height: 32px; place-items: center; border-radius: 50%; background: var(--accent-2); color: #fff; }
    .open, .mute { display: inline-grid; width: 28px; height: 28px; place-items: center; border-radius: 999px; }
    .open { border: 2px solid var(--green); color: var(--green); }
    .mute { border: 2px solid var(--red); color: var(--red); }

    @media (max-width: 860px) {
      .app, .card-body { grid-template-columns: 1fr; }
      .panel { position: static; }
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <h1>🎸 木吉他和弦查詢器（MVP）</h1>
      <p>先做最小可運作版本：Major / Minor / 7 / m7 / sus2 / sus4。</p>
    </header>

    <section class="app">
      <aside class="panel">
        <label for="chordSelect">選擇和弦</label>
        <select id="chordSelect"></select>
        <ul class="legend">
          <li><span class="pressed">1</span> 圓點數字 = 建議手指</li>
          <li><span class="open-string">O</span> 空弦</li>
          <li><span class="muted-string">X</span> 悶音</li>
        </ul>
      </aside>

      <article class="card" aria-live="polite">
        <header class="card-header">
          <div>
            <h2 class="title" id="chordName"></h2>
            <p class="subtitle" id="chordInfo"></p>
          </div>
          <span class="badge" id="stateBadge"></span>
        </header>

        <div class="card-body">
          <section>
            <div class="box">
              <h3>組成音</h3>
              <ul class="chips" id="notes"></ul>
            </div>
            <div class="box">
              <h3>音程</h3>
              <ul class="chips" id="intervals"></ul>
            </div>
            <div class="box">
              <h3>主要六線按法</h3>
              <p class="fingering" id="fingering">-</p>
            </div>
            <div class="box">
              <h3>提示</h3>
              <p class="msg" id="tip"></p>
            </div>
          </section>

          <section class="diagram-wrap">
            <div class="strings"><span>E</span><span>A</span><span>D</span><span>G</span><span>B</span><span>e</span></div>
            <div id="diagramArea"></div>
          </section>
        </div>
      </article>
    </section>
  </main>

  <script>
    const NOTE_INDEX = { C:0, 'C#':1, Db:1, D:2, 'D#':3, Eb:3, E:4, F:5, 'F#':6, Gb:6, G:7, 'G#':8, Ab:8, A:9, 'A#':10, Bb:10, B:11 };
    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const TUNING = [4,9,2,7,11,4]; // E A D G B e

    const QUALITY_GROUPS = [
      {
        label: '基礎和弦',
        qualities: [
          { suffix:'', en:'Major', zh:'大三和弦', intervals:[0,4,7], intervalLabels:['1','3','5'], emotion:'明亮、穩定。', tip:'先把每條弦分開彈，確認沒有悶音。' },
          { suffix:'m', en:'Minor', zh:'小三和弦', intervals:[0,3,7], intervalLabels:['1','b3','5'], emotion:'內斂、微憂鬱。', tip:'注意 b3 音的清晰度，和 Major 對照聽。' },
          { suffix:'7', en:'Dominant 7', zh:'屬七和弦', intervals:[0,4,7,10], intervalLabels:['1','3','5','b7'], emotion:'有張力、會想解決。', tip:'練 7 到 Major 的解決聲響。' },
          { suffix:'m7', en:'Minor 7', zh:'小七和弦', intervals:[0,3,7,10], intervalLabels:['1','b3','5','b7'], emotion:'柔和、慵懶。', tip:'小橫按時手指靠近琴衍可省力。' },
          { suffix:'sus2', en:'Suspended 2', zh:'掛二和弦', intervals:[0,2,7], intervalLabels:['1','2','5'], emotion:'開闊、清新。', tip:'練 sus2 回到大三和弦的變化。' },
          { suffix:'sus4', en:'Suspended 4', zh:'掛四和弦', intervals:[0,5,7], intervalLabels:['1','4','5'], emotion:'懸浮、期待解決。', tip:'練 sus4 回到大三和弦的解決感。' }
        ]
      }
    ];

    // status: verified | unverified | formulaOnly
    const VOICINGS = {
      'C':   { status:'verified', frets:['X',3,2,0,1,0], fingers:['',3,2,'',1,''] },
      'G':   { status:'verified', frets:[3,2,0,0,0,3], fingers:[2,1,'','','',3] },
      'D':   { status:'verified', frets:['X','X',0,2,3,2], fingers:['','','',1,3,2] },
      'A':   { status:'verified', frets:['X',0,2,2,2,0], fingers:['','',1,2,3,''] },
      'E':   { status:'verified', frets:[0,2,2,1,0,0], fingers:['',2,3,1,'',''] },
      'Am':  { status:'verified', frets:['X',0,2,2,1,0], fingers:['','',2,3,1,''] },
      'Em':  { status:'verified', frets:[0,2,2,0,0,0], fingers:['',2,3,'','',''] },
      'Dm':  { status:'verified', frets:['X','X',0,2,3,1], fingers:['','','',2,3,1] },
      'A7':  { status:'verified', frets:['X',0,2,0,2,0], fingers:['','',1,'',2,''] },
      'E7':  { status:'verified', frets:[0,2,0,1,0,0], fingers:['',2,'',1,'',''] },
      'D7':  { status:'verified', frets:['X','X',0,2,1,2], fingers:['','','',2,1,3] },
      'Am7': { status:'verified', frets:['X',0,2,0,1,0], fingers:['','',2,'',1,''] },
      'Em7': { status:'verified', frets:[0,2,2,0,3,0], fingers:['',1,2,'',3,''] },
      'Dm7': { status:'verified', frets:['X','X',0,2,1,1], fingers:['','','',2,1,1] },
      'Asus2': { status:'verified', frets:['X',0,2,2,0,0], fingers:['','',1,2,'',''] },
      'Dsus2': { status:'verified', frets:['X','X',0,2,3,0], fingers:['','','',1,3,''] },
      'Asus4': { status:'verified', frets:['X',0,2,2,3,0], fingers:['','',1,2,3,''] },
      'Dsus4': { status:'verified', frets:['X','X',0,2,3,3], fingers:['','','',1,2,3] },

      'Fsus2': { status:'formulaOnly' },
      'Gsus4': { status:'unverified', frets:[3,3,0,0,1,3], fingers:[2,3,'', '',1,4] }
    };

    const ROOTS = ['C','D','E','F','G','A','B'];

    const el = {
      select: document.getElementById('chordSelect'),
      name: document.getElementById('chordName'),
      info: document.getElementById('chordInfo'),
      badge: document.getElementById('stateBadge'),
      notes: document.getElementById('notes'),
      intervals: document.getElementById('intervals'),
      fingering: document.getElementById('fingering'),
      tip: document.getElementById('tip'),
      diagramArea: document.getElementById('diagramArea')
    };

    function buildChordList() {
      const result = [];
      QUALITY_GROUPS[0].qualities.forEach(q => {
        ROOTS.forEach(root => {
          result.push({ root, ...q, name: `${root}${q.suffix}` });
        });
      });
      return result;
    }

    const CHORDS = buildChordList();

    function getNotes(root, intervals) {
      const idx = NOTE_INDEX[root];
      return intervals.map(i => NOTE_NAMES[(idx + i) % 12]);
    }

    function renderChips(container, items) {
      container.replaceChildren();
      items.forEach(t => {
        const li = document.createElement('li');
        li.className = 'chip';
        li.textContent = t;
        container.appendChild(li);
      });
    }

    function validateVoicing(chordNotes, frets, chordName) {
      const pcs = new Set(chordNotes.map(n => NOTE_INDEX[n]));
      let ok = true;
      frets.forEach((fret, i) => {
        if (fret === 'X') return;
        const pc = (TUNING[i] + fret) % 12;
        if (!pcs.has(pc)) {
          ok = false;
          console.warn(`[validateVoicing] ${chordName} 含錯音: string ${6 - i}, fret ${fret}, note ${NOTE_NAMES[pc]}`);
        }
      });
      return ok;
    }

    function createStatusCell(value) {
      const td = document.createElement('td');
      if (value === 'X') {
        const s = document.createElement('span'); s.className = 'mute'; s.textContent = 'X'; td.appendChild(s);
      } else if (value === 0) {
        const s = document.createElement('span'); s.className = 'open'; s.textContent = 'O'; td.appendChild(s);
      }
      return td;
    }

    function renderFretboard(frets, fingers) {
      const table = document.createElement('table');
      const headRow = document.createElement('tr');
      frets.forEach(v => headRow.appendChild(createStatusCell(v)));
      table.appendChild(headRow);

      for (let fret = 1; fret <= 4; fret++) {
        const tr = document.createElement('tr');
        frets.forEach((v, i) => {
          const td = document.createElement('td');
          if (v === fret) {
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.textContent = fingers[i] || '';
            td.appendChild(dot);
          }
          tr.appendChild(td);
        });
        table.appendChild(tr);
      }
      return table;
    }

    function render(chordName) {
      const chord = CHORDS.find(c => c.name === chordName) || CHORDS[0];
      const notes = getNotes(chord.root, chord.intervals);
      const voicing = VOICINGS[chord.name];

      el.name.textContent = `${chord.name} 和弦`;
      el.info.textContent = `${chord.en}｜${chord.zh}｜${chord.emotion}`;
      renderChips(el.notes, notes);
      renderChips(el.intervals, chord.intervalLabels);
      el.tip.textContent = chord.tip;
      el.diagramArea.replaceChildren();

      if (!voicing || voicing.status !== 'verified') {
        const status = voicing?.status || 'formulaOnly';
        el.badge.textContent = status;
        el.fingering.textContent = '-';
        const p = document.createElement('p');
        p.className = 'msg';
        p.textContent = '此和弦按法整理中（目前僅顯示組成音）。';
        el.diagramArea.appendChild(p);
        return;
      }

      if (!validateVoicing(notes, voicing.frets, chord.name)) {
        el.badge.textContent = 'invalid';
        el.fingering.textContent = '-';
        const p = document.createElement('p');
        p.className = 'msg';
        p.textContent = '此和弦按法整理中（偵測到錯音，已隱藏）。';
        el.diagramArea.appendChild(p);
        return;
      }

      el.badge.textContent = 'verified';
      el.fingering.textContent = voicing.frets.map(f => (f === 'X' ? 'X' : String(f))).join('');
      el.diagramArea.appendChild(renderFretboard(voicing.frets, voicing.fingers));
    }

    function init() {
      QUALITY_GROUPS[0].qualities.forEach(group => {
        const og = document.createElement('optgroup');
        og.label = `${group.en} / ${group.zh}`;
        ROOTS.forEach(root => {
          const op = document.createElement('option');
          op.value = `${root}${group.suffix}`;
          op.textContent = `${root}${group.suffix}`;
          og.appendChild(op);
        });
        el.select.appendChild(og);
      });

      el.select.value = 'C';
      el.select.addEventListener('change', () => render(el.select.value));
      render('C');
    }

    init();
  </script>
</body>
</html>
