<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="木吉他全和弦查詢器，包含組成音、音程、開放和弦、封閉和弦與其他常用按法。" />
  <title>木吉他全和弦查詢器</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #11100f;
      --surface: #1c1a18;
      --surface-2: #27231f;
      --surface-3: #342d27;
      --text: #fff8ee;
      --muted: #c9bca9;
      --accent: #ffd166;
      --accent-2: #ff7a59;
      --green: #8fd694;
      --red: #ff8a80;
      --line: rgba(255, 255, 255, 0.16);
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 209, 102, 0.18), transparent 34rem),
        linear-gradient(135deg, #120f0d 0%, #1c1714 52%, #0c0b0a 100%);
      color: var(--text);
      line-height: 1.6;
    }

    main {
      width: min(100% - 24px, 1280px);
      margin: 0 auto;
      padding: 36px 0;
    }

    .hero {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
      text-align: center;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.1;
    }

    .hero p {
      max-width: 760px;
      margin: 0 auto;
      color: var(--muted);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(240px, 300px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel,
    .card {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(28, 26, 24, 0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .panel {
      position: sticky;
      top: 18px;
      padding: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    select {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      margin-bottom: 16px;
      background: var(--surface-2);
      color: var(--text);
      font: inherit;
      cursor: pointer;
      outline: none;
    }

    select:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 209, 102, 0.16);
    }

    .legend {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      color: var(--muted);
      font-size: 0.95rem;
      list-style: none;
    }

    .legend span {
      display: inline-grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border-radius: 999px;
      margin-right: 8px;
      color: #140f0d;
      font-weight: 800;
    }

    .legend .pressed {
      background: var(--accent-2);
      color: white;
    }

    .legend .open-string {
      background: var(--green);
    }

    .legend .muted-string {
      background: var(--red);
    }

    .legend .barre-string {
      background: var(--accent);
    }

    .card {
      overflow: hidden;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.14), rgba(255, 122, 89, 0.08));
    }

    .title {
      margin: 0 0 6px;
      color: var(--accent);
      font-size: clamp(1.8rem, 5vw, 2.7rem);
      line-height: 1;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
    }

    .difficulty {
      align-self: start;
      flex: 0 0 auto;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 209, 102, 0.16);
      color: var(--accent);
      font-weight: 800;
    }

    .card-body {
      display: grid;
      grid-template-columns: minmax(260px, 330px) minmax(0, 1fr);
      gap: 22px;
      padding: 22px;
    }

    .info-grid {
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .info-box,
    .diagram-card,
    .other-section {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.035);
    }

    .info-box h2,
    .diagram-card h3,
    .other-section h3 {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .chip {
      padding: 7px 11px;
      border-radius: 999px;
      background: var(--surface-3);
      color: var(--text);
      font-weight: 800;
    }

    .fingering {
      margin: 0;
      font-size: clamp(1.35rem, 4vw, 2.05rem);
      font-weight: 900;
      letter-spacing: 0.18em;
      word-break: break-word;
    }

    .tip,
    .diagram-note,
    .section-note {
      margin: 0;
      color: var(--muted);
    }

    .diagram-wrap {
      display: grid;
      gap: 14px;
      overflow-x: visible;
      padding-bottom: 4px;
    }

    .primary-diagrams,
    .other-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
      gap: 14px;
    }

    .strings {
      display: grid;
      grid-template-columns: 38px repeat(6, 1fr);
      min-width: 0;
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 800;
      text-align: center;
    }

    .strings span:first-child {
      text-align: left;
    }

    table {
      width: 100%;
      min-width: 0;
      border-collapse: collapse;
      table-layout: fixed;
      background: #201b17;
    }

    caption {
      margin-bottom: 10px;
      color: var(--muted);
      text-align: left;
    }

    th,
    td {
      position: relative;
      height: 54px;
      border: 2px solid #76614f;
      text-align: center;
      vertical-align: middle;
      font-size: 1.05rem;
      font-weight: 800;
    }

    th.fret-label {
      width: 38px;
      border-color: transparent rgba(255, 255, 255, 0.12) transparent transparent;
      background: rgba(255, 255, 255, 0.02);
      color: var(--accent);
      font-size: 0.86rem;
      letter-spacing: 0;
    }

    tr.status-row th,
    tr.status-row td {
      height: 42px;
      border-top: 8px solid #c7a47a;
      background: rgba(255, 255, 255, 0.03);
    }

    tr.shifted-row th,
    tr.shifted-row td {
      border-top-width: 2px;
    }

    .dot {
      display: inline-grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 50%;
      background: var(--accent-2);
      color: white;
      box-shadow: 0 8px 18px rgba(255, 122, 89, 0.32);
    }

    .barre {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #21140f;
      box-shadow: 0 8px 18px rgba(255, 209, 102, 0.26);
    }

    .open,
    .mute {
      display: inline-grid;
      width: 30px;
      height: 30px;
      place-items: center;
      border-radius: 999px;
    }

    .open {
      border: 2px solid var(--green);
      color: var(--green);
    }

    .mute {
      border: 2px solid var(--red);
      color: var(--red);
    }

    .empty-voicing {
      min-width: 0;
      padding: 16px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.025);
    }

    .other-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .other-header h3 {
      margin-bottom: 4px;
    }

    .count-badge {
      flex: 0 0 auto;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 209, 102, 0.16);
      color: var(--accent);
      font-size: 0.86rem;
      font-weight: 800;
    }

    .other-grid {
      max-height: 760px;
      overflow: auto;
      padding-right: 4px;
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 20px, 1280px);
        padding: 24px 0;
      }

      .app,
      .card-body {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }

      .card-header,
      .other-header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <p class="eyebrow">Acoustic Guitar Helper</p>
      <h1>🎸 木吉他全和弦查詢器</h1>
      <p>選擇常用或進階和弦，快速查看組成音、開放和弦、封閉和弦，以及到第 12 格為止的其他常用按法。這版把介面加寬，減少左右滑動。</p>
    </header>

    <section class="app" aria-label="和弦查詢工具">
      <aside class="panel">
        <label for="chordSelect">選擇和弦</label>
        <select id="chordSelect"></select>

        <ul class="legend" aria-label="圖例">
          <li><span class="pressed">1</span>圓點數字代表建議手指</li>
          <li><span class="open-string">O</span>空弦要彈</li>
          <li><span class="muted-string">X</span>悶音不要彈</li>
          <li><span class="barre-string">B</span>封閉和弦的食指橫按</li>
        </ul>
      </aside>

      <article class="card" aria-live="polite">
        <header class="card-header">
          <div>
            <h2 class="title" id="chordName"></h2>
            <p class="subtitle" id="chordQuality"></p>
          </div>
          <span class="difficulty" id="difficulty"></span>
        </header>

        <div class="card-body">
          <div class="info-grid">
            <section class="info-box" aria-labelledby="notesTitle">
              <h2 id="notesTitle">組成音</h2>
              <ul class="chips" id="notesList"></ul>
            </section>

            <section class="info-box" aria-labelledby="intervalsTitle">
              <h2 id="intervalsTitle">音程</h2>
              <ul class="chips" id="intervalList"></ul>
            </section>

            <section class="info-box" aria-labelledby="fingeringTitle">
              <h2 id="fingeringTitle">主要六線按法</h2>
              <p class="fingering" id="fingering"></p>
            </section>

            <section class="info-box" aria-labelledby="tipTitle">
              <h2 id="tipTitle">練習提示</h2>
              <p class="tip" id="tip"></p>
            </section>
          </div>

          <section class="diagram-wrap" aria-labelledby="diagramTitle">
            <h2 class="visually-hidden" id="diagramTitle">和弦圖</h2>
            <div class="primary-diagrams" id="primaryDiagrams"></div>

            <section class="other-section" aria-labelledby="otherTitle">
              <div class="other-header">
                <div>
                  <h3 id="otherTitle">其他常用按法</h3>
                  <p class="section-note">自動列出第 0 到第 12 格內可用、跨度不超過 4 格且包含根音的按法。</p>
                </div>
                <span class="count-badge" id="otherCount"></span>
              </div>
              <div class="other-grid" id="otherDiagrams"></div>
            </section>
          </section>
        </div>
      </article>
    </section>
  </main>

  <script>
    const ROOTS = ['C', 'C#', 'Db', 'D', 'D#', 'Eb', 'E', 'F', 'F#', 'Gb', 'G', 'G#', 'Ab', 'A', 'A#', 'Bb', 'B'];
    const TUNING = [4, 9, 2, 7, 11, 4];
    const STRING_NAMES = ['E', 'A', 'D', 'G', 'B', 'e'];
    const MAX_FRET = 12;
    const MAX_OTHER = 30;
    const LETTER_TO_PC = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
    const NOTE_INDEX = {
      C: 0, 'B#': 0,
      'C#': 1, Db: 1,
      D: 2,
      'D#': 3, Eb: 3,
      E: 4, Fb: 4,
      F: 5, 'E#': 5,
      'F#': 6, Gb: 6,
      G: 7,
      'G#': 8, Ab: 8,
      A: 9,
      'A#': 10, Bb: 10,
      B: 11, Cb: 11
    };

    const QUALITY_GROUPS = [
      {
        label: '大調與延伸 Major',
        items: [
          { suffix: '', name: 'Major', zh: '大三和弦', degrees: [1, 3, 5], intervals: [0, 4, 7], intervalLabels: ['1', '3', '5'], tip: '聲音明亮穩定，是民謠與流行歌曲最常見的和弦骨架。' },
          { suffix: '5', name: 'Power Chord', zh: '五和弦', degrees: [1, 5], intervals: [0, 7], intervalLabels: ['1', '5'], tip: '只保留根音與五度，刷電吉他或強力節奏時很常見。' },
          { suffix: '6', name: 'Major 6', zh: '大六和弦', degrees: [1, 3, 5, 6], intervals: [0, 4, 7, 9], intervalLabels: ['1', '3', '5', '6'], tip: '比大三和弦多一點復古與溫暖感，適合慢慢分解彈。' },
          { suffix: '6/9', name: 'Major 6/9', zh: '大六九和弦', degrees: [1, 3, 5, 6, 9], intervals: [0, 4, 7, 9, 14], intervalLabels: ['1', '3', '5', '6', '9'], tip: '色彩柔和，常見於爵士、Neo Soul 與結尾延伸。' },
          { suffix: 'add9', name: 'Add 9', zh: '加九和弦', degrees: [1, 3, 5, 9], intervals: [0, 4, 7, 14], intervalLabels: ['1', '3', '5', '9'], tip: '保留大三和弦的穩定，加入九度會更空靈。' },
          { suffix: 'maj7', name: 'Major 7', zh: '大七和弦', degrees: [1, 3, 5, 7], intervals: [0, 4, 7, 11], intervalLabels: ['1', '3', '5', '7'], tip: '有柔和、夢幻的味道，適合用較輕的刷弦力度。' },
          { suffix: 'maj9', name: 'Major 9', zh: '大九和弦', degrees: [1, 3, 5, 7, 9], intervals: [0, 4, 7, 11, 14], intervalLabels: ['1', '3', '5', '7', '9'], tip: '大七加上九度，聲音更寬，建議先按慢再刷。' },
          { suffix: 'maj11', name: 'Major 11', zh: '大十一和弦', degrees: [1, 3, 5, 7, 9, 11], intervals: [0, 4, 7, 11, 14, 17], intervalLabels: ['1', '3', '5', '7', '9', '11'], tip: '延伸音很多，吉他上可接受省略部分音，重點是保留根音與大七色彩。' },
          { suffix: 'maj13', name: 'Major 13', zh: '大十三和弦', degrees: [1, 3, 5, 7, 9, 13], intervals: [0, 4, 7, 11, 14, 21], intervalLabels: ['1', '3', '5', '7', '9', '13'], tip: '華麗但容易糊，建議分解確認每條弦再刷。' },
          { suffix: 'aug', name: 'Augmented', zh: '增三和弦', degrees: [1, 3, 5], intervals: [0, 4, 8], intervalLabels: ['1', '3', '#5'], tip: '增五度會帶來不穩定、往下一個和弦前進的感覺。' }
        ]
      },
      {
        label: '小調與延伸 Minor',
        items: [
          { suffix: 'm', name: 'Minor', zh: '小三和弦', degrees: [1, 3, 5], intervals: [0, 3, 7], intervalLabels: ['1', 'b3', '5'], tip: '聲音溫暖帶一點哀傷，適合和大三和弦一起練轉換。' },
          { suffix: 'm6', name: 'Minor 6', zh: '小六和弦', degrees: [1, 3, 5, 6], intervals: [0, 3, 7, 9], intervalLabels: ['1', 'b3', '5', '6'], tip: '小和弦加六度，常有爵士或老派流行的色彩。' },
          { suffix: 'm7', name: 'Minor 7', zh: '小七和弦', degrees: [1, 3, 5, 7], intervals: [0, 3, 7, 10], intervalLabels: ['1', 'b3', '5', 'b7'], tip: '比小三和弦更柔順，刷弦時注意悶掉不該響的弦。' },
          { suffix: 'm7(b5)', name: 'Minor 7 Flat 5', zh: '半減七和弦', degrees: [1, 3, 5, 7], intervals: [0, 3, 6, 10], intervalLabels: ['1', 'b3', 'b5', 'b7'], tip: '半減七常出現在爵士 iiø-V-i，先確認降五度的位置。' },
          { suffix: 'm9', name: 'Minor 9', zh: '小九和弦', degrees: [1, 3, 5, 7, 9], intervals: [0, 3, 7, 10, 14], intervalLabels: ['1', 'b3', '5', 'b7', '9'], tip: '小七加九度，聲音更深，適合慢速分解。' },
          { suffix: 'm11', name: 'Minor 11', zh: '小十一和弦', degrees: [1, 3, 5, 7, 9, 11], intervals: [0, 3, 7, 10, 14, 17], intervalLabels: ['1', 'b3', '5', 'b7', '9', '11'], tip: '可移動形狀很實用，注意食指橫按要平均施力。' },
          { suffix: 'm13', name: 'Minor 13', zh: '小十三和弦', degrees: [1, 3, 5, 7, 9, 13], intervals: [0, 3, 7, 10, 14, 21], intervalLabels: ['1', 'b3', '5', 'b7', '9', '13'], tip: '延伸音較多，先抓住根音、小三度與小七度即可建立色彩。' },
          { suffix: 'dim', name: 'Diminished', zh: '減三和弦', degrees: [1, 3, 5], intervals: [0, 3, 6], intervalLabels: ['1', 'b3', 'b5'], tip: '減五度讓聲音緊張，很適合作為經過和弦。' },
          { suffix: 'dim7', name: 'Diminished 7', zh: '減七和弦', degrees: [1, 3, 5, 7], intervals: [0, 3, 6, 9], intervalLabels: ['1', 'b3', 'b5', 'bb7'], tip: '對稱結構很好移動，每隔三格會得到同一組音的轉位。' }
        ]
      },
      {
        label: '屬七與變化 Dominant',
        items: [
          { suffix: '7', name: 'Dominant 7', zh: '屬七和弦', degrees: [1, 3, 5, 7], intervals: [0, 4, 7, 10], intervalLabels: ['1', '3', '5', 'b7'], tip: '很適合接回主和弦，也常用在藍調與民謠結尾。' },
          { suffix: '7(b5)', name: 'Dominant 7 Flat 5', zh: '屬七降五', degrees: [1, 3, 5, 7], intervals: [0, 4, 6, 10], intervalLabels: ['1', '3', 'b5', 'b7'], tip: '比普通屬七更緊張，使用時讓聲音清楚不要刷太重。' },
          { suffix: '7(b9)', name: 'Dominant 7 Flat 9', zh: '屬七降九', degrees: [1, 3, 5, 7, 9], intervals: [0, 4, 7, 10, 13], intervalLabels: ['1', '3', '5', 'b7', 'b9'], tip: '降九音色強烈，適合慢慢彈出每個音的張力。' },
          { suffix: '7(#9)', name: 'Dominant 7 Sharp 9', zh: '屬七升九', degrees: [1, 3, 5, 7, 9], intervals: [0, 4, 7, 10, 15], intervalLabels: ['1', '3', '5', 'b7', '#9'], tip: '藍調與放克常見，升九的張力要讓它清楚響出來。' },
          { suffix: '7sus4', name: 'Dominant 7 Sus 4', zh: '屬七掛四', degrees: [1, 4, 5, 7], intervals: [0, 5, 7, 10], intervalLabels: ['1', '4', '5', 'b7'], tip: '先掛住四度再回到三度，能做出很自然的解決感。' },
          { suffix: '9', name: 'Dominant 9', zh: '屬九和弦', degrees: [1, 3, 5, 7, 9], intervals: [0, 4, 7, 10, 14], intervalLabels: ['1', '3', '5', 'b7', '9'], tip: '藍調與爵士很常用，若低音太濁可以少刷第 6 弦。' },
          { suffix: '11', name: 'Dominant 11', zh: '屬十一和弦', degrees: [1, 3, 5, 7, 9, 11], intervals: [0, 4, 7, 10, 14, 17], intervalLabels: ['1', '3', '5', 'b7', '9', '11'], tip: '十一度會帶出懸浮感，適合分解或輕刷。' },
          { suffix: '13', name: 'Dominant 13', zh: '屬十三和弦', degrees: [1, 3, 5, 7, 9, 13], intervals: [0, 4, 7, 10, 14, 21], intervalLabels: ['1', '3', '5', 'b7', '9', '13'], tip: '爵士感最明顯，先確認小七度與十三度都有聽到。' }
        ]
      },
      {
        label: '掛留 Sus',
        items: [
          { suffix: 'sus2', name: 'Suspended 2', zh: '掛二和弦', degrees: [1, 2, 5], intervals: [0, 2, 7], intervalLabels: ['1', '2', '5'], tip: '用二度取代三度，聲音開闊、不明顯大調或小調。' },
          { suffix: 'sus4', name: 'Suspended 4', zh: '掛四和弦', degrees: [1, 4, 5], intervals: [0, 5, 7], intervalLabels: ['1', '4', '5'], tip: '用四度取代三度，常見練法是 sus4 回到大三和弦。' }
        ]
      }
    ];

    const QUALITIES = QUALITY_GROUPS.flatMap(group => group.items);
    const select = document.getElementById('chordSelect');
    const chordName = document.getElementById('chordName');
    const chordQuality = document.getElementById('chordQuality');
    const difficulty = document.getElementById('difficulty');
    const notesList = document.getElementById('notesList');
    const intervalList = document.getElementById('intervalList');
    const fingering = document.getElementById('fingering');
    const tip = document.getElementById('tip');
    const primaryDiagrams = document.getElementById('primaryDiagrams');
    const otherDiagrams = document.getElementById('otherDiagrams');
    const otherCount = document.getElementById('otherCount');

    function normalizeIndex(note) {
      return NOTE_INDEX[note];
    }

    function formatChordName(root, suffix) {
      return `${root}${suffix}`;
    }

    function getPressedFrets(frets) {
      return frets.filter(Number.isInteger).filter(fret => fret > 0);
    }

    function getFingering(frets) {
      return frets.map(fret => (fret === 'X' ? 'X' : String(fret))).join('');
    }

    function normalizeVoicingKey(frets) {
      return frets.join('-');
    }

    function applyAccidental(letter, diff) {
      if (diff === 0) return letter;
      if (diff > 0) return `${letter}${'#'.repeat(diff)}`;
      return `${letter}${'b'.repeat(Math.abs(diff))}`;
    }

    function spellNote(root, degree, interval) {
      const letters = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
      const rootLetterIndex = letters.indexOf(root[0]);
      const targetLetter = letters[(rootLetterIndex + ((degree - 1) % 7)) % 7];
      const targetPc = (normalizeIndex(root) + interval) % 12;
      const naturalPc = LETTER_TO_PC[targetLetter];
      let diff = (targetPc - naturalPc + 12) % 12;

      if (diff > 6) {
        diff -= 12;
      }

      return applyAccidental(targetLetter, diff);
    }

    function spellNotes(root, quality) {
      return quality.intervals.map((interval, index) => spellNote(root, quality.degrees[index], interval));
    }

    function buildStringChoices(stringIndex, noteSet, start, end) {
      const choices = ['X'];

      for (let fret = 0; fret <= MAX_FRET; fret += 1) {
        const pc = (TUNING[stringIndex] + fret) % 12;
        const inWindow = fret === 0 || (fret >= start && fret <= end);

        if (noteSet.has(pc) && inWindow) {
          choices.push(fret);
        }
      }

      return choices;
    }

    function hasRoot(frets, rootPc) {
      return frets.some((fret, index) => Number.isInteger(fret) && (TUNING[index] + fret) % 12 === rootPc);
    }

    function isPlayableVoicing(frets, rootPc, quality) {
      const sounding = frets.filter(value => value !== 'X');
      const pressed = getPressedFrets(frets);
      const uniquePcs = new Set(frets.filter(Number.isInteger).map((fret, index) => (TUNING[index] + fret) % 12));
      const minRequiredNotes = Math.min(quality.intervals.length, 4);

      if (sounding.length < 3 || sounding.length > 6) return false;
      if (!hasRoot(frets, rootPc)) return false;
      if (uniquePcs.size < minRequiredNotes) return false;

      if (pressed.length) {
        const span = Math.max(...pressed) - Math.min(...pressed);
        if (span > 4) return false;
      }

      return true;
    }

    function guessFingers(frets) {
      const pressed = getPressedFrets(frets);

      if (!pressed.length) {
        return frets.map(() => '');
      }

      const uniqueFrets = [...new Set(pressed)].sort((a, b) => a - b);
      const minFret = uniqueFrets[0];
      const minCount = pressed.filter(fret => fret === minFret).length;
      const fretToFinger = new Map();
      let nextFinger = 1;

      uniqueFrets.forEach(fret => {
        if (fret === minFret && minCount > 1) {
          fretToFinger.set(fret, 1);
          nextFinger = 2;
        } else {
          fretToFinger.set(fret, Math.min(nextFinger, 4));
          nextFinger += 1;
        }
      });

      return frets.map(fret => (Number.isInteger(fret) && fret > 0 ? fretToFinger.get(fret) : ''));
    }

    function hasBarre(frets, fingers) {
      const firstFingerFrets = frets.filter((fret, index) => fingers[index] === 1 && fret > 0);
      return firstFingerFrets.length > 1;
    }

    function scoreVoicing(frets, rootPc) {
      const pressed = getPressedFrets(frets);
      const sounding = frets.filter(value => value !== 'X').length;
      const muted = frets.filter(value => value === 'X').length;
      const minFret = pressed.length ? Math.min(...pressed) : 0;
      const span = pressed.length ? Math.max(...pressed) - minFret : 0;
      const bassIndex = frets.findIndex(value => value !== 'X');
      const bassIsRoot = bassIndex >= 0 && (TUNING[bassIndex] + frets[bassIndex]) % 12 === rootPc;
      const hasOpen = frets.includes(0);

      return (minFret * 12) + (span * 8) + (muted * 5) - (sounding * 2) - (bassIsRoot ? 6 : 0) - (hasOpen ? 3 : 0);
    }

    function generateVoicings(root, quality) {
      const rootPc = normalizeIndex(root);
      const noteSet = new Set(quality.intervals.map(interval => (rootPc + interval) % 12));
      const voicings = [];
      const seen = new Set();

      for (let start = 0; start <= MAX_FRET - 3; start += 1) {
        const end = start + 4;
        const choices = TUNING.map((_, stringIndex) => buildStringChoices(stringIndex, noteSet, start, end));

        choices[0].forEach(s6 => {
          choices[1].forEach(s5 => {
            choices[2].forEach(s4 => {
              choices[3].forEach(s3 => {
                choices[4].forEach(s2 => {
                  choices[5].forEach(s1 => {
                    const frets = [s6, s5, s4, s3, s2, s1];
                    const key = normalizeVoicingKey(frets);

                    if (seen.has(key) || !isPlayableVoicing(frets, rootPc, quality)) {
                      return;
                    }

                    const fingers = guessFingers(frets);
                    const pressed = getPressedFrets(frets);
                    const hasOpenString = frets.includes(0);
                    const isClosed = !hasOpenString && pressed.length > 0;
                    const minFret = pressed.length ? Math.min(...pressed) : 0;

                    seen.add(key);
                    voicings.push({
                      frets,
                      fingers,
                      barre: hasBarre(frets, fingers),
                      hasOpenString,
                      isClosed,
                      minFret,
                      note: `六線按法：${getFingering(frets)}`,
                      score: scoreVoicing(frets, rootPc)
                    });
                  });
                });
              });
            });
          });
        });
      }

      return voicings.sort((a, b) => a.score - b.score);
    }

    function buildChord(root, quality) {
      const voicings = generateVoicings(root, quality);
      const openVoicing = voicings.find(voicing => voicing.hasOpenString) || null;
      const closedVoicing = voicings.find(voicing => voicing.isClosed) || null;
      const excluded = new Set([openVoicing, closedVoicing].filter(Boolean).map(voicing => normalizeVoicingKey(voicing.frets)));
      const otherVoicings = voicings
        .filter(voicing => !excluded.has(normalizeVoicingKey(voicing.frets)))
        .slice(0, MAX_OTHER)
        .map((voicing, index) => ({
          ...voicing,
          label: `其他按法 ${index + 1}`
        }));

      return {
        label: `${formatChordName(root, quality.suffix)} 和弦`,
        quality: `${formatChordName(root, quality.suffix)} ${quality.name}｜${quality.zh}`,
        notes: spellNotes(root, quality),
        intervals: quality.intervalLabels,
        fingering: openVoicing ? getFingering(openVoicing.frets) : closedVoicing ? getFingering(closedVoicing.frets) : '無常用按法',
        difficulty: quality.intervals.length >= 5 ? '進階延伸' : openVoicing ? '新手友善' : '封閉和弦',
        tip: `${quality.tip} 其他按法可先從低把位開始，確認根音與必要音都有響，再慢慢移到高把位。`,
        openVoicing: openVoicing ? { ...openVoicing, label: '開放和弦', note: '這個版本包含空弦，適合民謠刷弦與初學轉換。' } : null,
        closedVoicing: closedVoicing ? { ...closedVoicing, label: '封閉和弦', note: '這個版本不使用空弦，可整組左右移動；超過第 4 格時左側會標示實際格數。' } : null,
        otherVoicings
      };
    }

    function buildOptions() {
      QUALITY_GROUPS.forEach(group => {
        const optgroup = document.createElement('optgroup');
        optgroup.label = group.label;

        group.items.forEach(quality => {
          ROOTS.forEach(root => {
            const option = document.createElement('option');
            const name = formatChordName(root, quality.suffix);
            option.value = name;
            option.textContent = `${name}｜${quality.zh}`;
            option.dataset.root = root;
            option.dataset.suffix = quality.suffix;
            optgroup.appendChild(option);
          });
        });

        select.appendChild(optgroup);
      });

      select.value = 'C';
    }

    function findQuality(suffix) {
      return QUALITIES.find(quality => quality.suffix === suffix) || QUALITIES[0];
    }

    function getSelectedChord() {
      const selected = select.selectedOptions[0];
      const root = selected?.dataset.root || 'C';
      const suffix = selected?.dataset.suffix || '';
      return buildChord(root, findQuality(suffix));
    }

    function renderChips(container, values) {
      container.replaceChildren();

      values.forEach(value => {
        const item = document.createElement('li');
        item.className = 'chip';
        item.textContent = value;
        container.appendChild(item);
      });
    }

    function createMarkerCell(value) {
      const cell = document.createElement('td');

      if (value === 'X') {
        const marker = document.createElement('span');
        marker.className = 'mute';
        marker.textContent = 'X';
        cell.appendChild(marker);
      } else if (value === 0) {
        const marker = document.createElement('span');
        marker.className = 'open';
        marker.textContent = 'O';
        cell.appendChild(marker);
      }

      return cell;
    }

    function createFretLabel(text) {
      const label = document.createElement('th');
      label.scope = 'row';
      label.className = 'fret-label';
      label.textContent = text;
      return label;
    }

    function getVisibleFrets(frets) {
      const pressed = getPressedFrets(frets);

      if (!pressed.length) {
        return [1, 2, 3, 4];
      }

      const minFret = Math.min(...pressed);
      const maxFret = Math.max(...pressed);
      const start = minFret > 4 ? minFret : 1;
      const end = Math.max(start + 3, maxFret);

      return Array.from({ length: end - start + 1 }, (_, index) => start + index);
    }

    function renderFretboard(voicing) {
      if (!voicing) {
        const message = document.createElement('p');
        message.className = 'empty-voicing';
        message.textContent = '這個和弦沒有常用版本，請參考其他按法。';
        return message;
      }

      const table = document.createElement('table');
      const caption = document.createElement('caption');
      const visibleFrets = getVisibleFrets(voicing.frets);
      const isShifted = visibleFrets[0] > 1;

      caption.textContent = isShifted
        ? '由左到右為第 6 弦到第 1 弦；左側數字代表實際格數。'
        : '由左到右為第 6 弦到第 1 弦，最上方粗線代表琴枕。';
      table.appendChild(caption);

      const statusRow = document.createElement('tr');
      statusRow.className = `status-row${isShifted ? ' shifted-row' : ''}`;
      statusRow.appendChild(createFretLabel(isShifted ? `${visibleFrets[0]}fr` : ''));
      voicing.frets.forEach(value => statusRow.appendChild(createMarkerCell(value)));
      table.appendChild(statusRow);

      visibleFrets.forEach(fret => {
        const row = document.createElement('tr');
        row.appendChild(createFretLabel(`${fret}`));

        voicing.frets.forEach((value, stringIndex) => {
          const cell = document.createElement('td');

          if (value === fret) {
            const dot = document.createElement('span');
            dot.className = voicing.barre && voicing.fingers[stringIndex] === 1 ? 'dot barre' : 'dot';
            dot.textContent = voicing.barre && voicing.fingers[stringIndex] === 1 ? 'B' : voicing.fingers[stringIndex] || '';
            dot.setAttribute('aria-label', `${fret} 格，第 ${6 - stringIndex} 弦`);
            cell.appendChild(dot);
          }

          row.appendChild(cell);
        });

        table.appendChild(row);
      });

      return table;
    }

    function createStringLabels() {
      const strings = document.createElement('div');
      strings.className = 'strings';
      strings.setAttribute('aria-hidden', 'true');

      ['', ...STRING_NAMES].forEach(stringName => {
        const string = document.createElement('span');
        string.textContent = stringName;
        strings.appendChild(string);
      });

      return strings;
    }

    function createDiagramCard(voicing, fallbackTitle) {
      const card = document.createElement('section');
      const heading = document.createElement('h3');
      const note = document.createElement('p');

      card.className = 'diagram-card';
      heading.textContent = voicing?.label || fallbackTitle;

      card.appendChild(heading);
      card.appendChild(createStringLabels());
      card.appendChild(renderFretboard(voicing));

      if (voicing?.note) {
        note.className = 'diagram-note';
        note.textContent = voicing.note;
        card.appendChild(note);
      }

      return card;
    }

    function renderChord() {
      const chord = getSelectedChord();

      chordName.textContent = chord.label;
      chordQuality.textContent = chord.quality;
      difficulty.textContent = chord.difficulty;
      fingering.textContent = chord.fingering;
      tip.textContent = chord.tip;
      otherCount.textContent = `${chord.otherVoicings.length} 種`;

      renderChips(notesList, chord.notes);
      renderChips(intervalList, chord.intervals);

      primaryDiagrams.replaceChildren(
        createDiagramCard(chord.openVoicing, '開放和弦'),
        createDiagramCard(chord.closedVoicing, '封閉和弦')
      );

      otherDiagrams.replaceChildren(
        ...chord.otherVoicings.map(voicing => createDiagramCard(voicing, '其他按法'))
      );
    }

    buildOptions();
    select.addEventListener('change', renderChord);
    renderChord();
  </script>
</body>
</html>
