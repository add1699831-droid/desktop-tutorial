    const MOVABLE_SHAPES = Object.fromEntries(QUALITIES.map(quality => [quality.suffix, SHAPE_FAMILIES.E.shapes[quality.suffix] ? { ...SHAPE_FAMILIES.E.shapes[quality.suffix], baseRoot: 'E', rootString: 6 } : { ...SHAPE_FAMILIES.A.shapes[quality.suffix], baseRoot: 'A', rootString: 5 }]));
    const select = document.getElementById('chordSelect'), chordName = document.getElementById('chordName'), chordQuality = document.getElementById('chordQuality'), difficulty = document.getElementById('difficulty'), notesList = document.getElementById('notesList'), fingering = document.getElementById('fingering'), tip = document.getElementById('tip'), chordDiagrams = document.getElementById('chordDiagrams');
    const noteIndex = note => NOTE_INDEX[note];
    const chordTitle = (root, suffix) => `${root}${suffix}`;
    const notesOf = (root, intervals) => intervals.map(interval => NOTE_NAMES[(noteIndex(root) + interval) % 12]);
    const fretText = frets => frets.map(fret => fret === 'X' ? 'X' : String(fret)).join('');
    function transpose(shapeData, root) { const offset = (noteIndex(root) - noteIndex(shapeData.baseRoot) + 12) % 12 || 12; return shapeData.frets.map(fret => fret === 'X' ? 'X' : fret + offset); }
    function openVoicing(name) { const voicing = OPEN_VOICINGS[name]; return voicing ? { label: '開放和弦', ...voicing, note: '這個版本包含空弦，適合民謠刷弦與初學轉換。' } : null; }
    function closedVoicing(root, quality) { const base = MOVABLE_SHAPES[quality.suffix]; return { label: '封閉和弦', frets: transpose(base, root), fingers: base.fingers, barre: base.barre, note: `${root} 根音在第 ${base.rootString} 弦；這是可移動形狀，超過第 4 格時左側會標示實際格數。` }; }
    function otherVoicings(root, quality, open, closed) { const seen = new Set([fretText(closed.frets), open ? fretText(open.frets) : '']); return Object.entries(SHAPE_FAMILIES).flatMap(([familyName, family]) => { const base = family.shapes[quality.suffix]; if (!base) return []; const frets = transpose({ ...base, baseRoot: family.baseRoot }, root), key = fretText(frets); if (seen.has(key)) return []; seen.add(key); return [{ label: `其他按法｜${familyName} 型`, frets, fingers: base.fingers, barre: base.barre, note: `${familyName} 型可移動按法，根音主要在第 ${family.rootString} 弦；同一形狀可平移到其他調。` }]; }); }
    function buildChord(root, quality) { const name = chordTitle(root, quality.suffix), open = openVoicing(name), closed = closedVoicing(root, quality); return { label: `${name} 和弦`, quality: `${name} ${quality.name}｜${quality.zh}`, notes: notesOf(root, quality.intervals), fingering: open ? fretText(open.frets) : fretText(closed.frets), difficulty: quality.suffix.match(/13|11|b9|#9/) ? '進階延伸' : open && !open.barre ? '新手友善' : '封閉和弦', tip: `${open?.tip || quality.tip} 封閉與其他按法請先把食指靠近琴衍，從低音到高音逐條檢查是否有悶音。`, open, closed, others: otherVoicings(root, quality, open, closed) }; }
    function buildOptions() { QUALITY_GROUPS.forEach(([label, items]) => { const group = document.createElement('optgroup'); group.label = label; items.forEach(item => ROOTS.forEach(root => { const option = document.createElement('option'); option.value = chordTitle(root, item[0]); option.textContent = `${option.value}｜${item[2]}`; option.dataset.root = root; option.dataset.suffix = item[0]; group.appendChild(option); })); select.appendChild(group); }); select.value = 'C'; }
    function renderNotes(notes) { notesList.replaceChildren(...notes.map(note => { const item = document.createElement('li'); item.className = 'chip'; item.textContent = note; return item; })); }
    function marker(value) { const cell = document.createElement('td'); if (value === 'X' || value === 0) { const span = document.createElement('span'); span.className = value === 'X' ? 'mute' : 'open'; span.textContent = value === 'X' ? 'X' : 'O'; cell.appendChild(span); } return cell; }
    function fretLabel(text) { const label = document.createElement('th'); label.scope = 'row'; label.className = 'fret-label'; label.textContent = text; return label; }
    function visibleFrets(frets) { const pressed = frets.filter(Number.isInteger), min = Math.min(...pressed.filter(fret => fret > 0)), max = Math.max(...pressed), start = min > 4 ? min : 1, end = Math.max(start + 3, max); return Array.from({ length: end - start + 1 }, (_, index) => start + index); }
    function renderFretboard(voicing) { if (!voicing) { const p = document.createElement('p'); p.className = 'empty-voicing'; p.textContent = '這個和弦沒有常用開放版本，請先練右邊的封閉和弦與其他按法。'; return p; } const table = document.createElement('table'), caption = document.createElement('caption'), frets = visibleFrets(voicing.frets), shifted = frets[0] > 1; caption.textContent = shifted ? '由左到右為第 6 弦到第 1 弦；左側數字代表實際格數。' : '由左到右為第 6 弦到第 1 弦，最上方粗線代表琴枕。'; table.appendChild(caption); const status = document.createElement('tr'); status.className = `status-row${shifted ? ' shifted-row' : ''}`; status.appendChild(fretLabel(shifted ? `${frets[0]}fr` : '')); voicing.frets.forEach(value => status.appendChild(marker(value))); table.appendChild(status); frets.forEach(fret => { const row = document.createElement('tr'); row.appendChild(fretLabel(`${fret}`)); voicing.frets.forEach((value, stringIndex) => { const cell = document.createElement('td'); if (value === fret) { const dot = document.createElement('span'); dot.className = voicing.barre && voicing.fingers[stringIndex] === '1' ? 'dot barre' : 'dot'; dot.textContent = voicing.barre && voicing.fingers[stringIndex] === '1' ? 'B' : voicing.fingers[stringIndex] || ''; dot.setAttribute('aria-label', `${fret} 格，第 ${6 - stringIndex} 弦`); cell.appendChild(dot); } row.appendChild(cell); }); table.appendChild(row); }); return table; }
    function diagram(voicing) { const card = document.createElement('section'), strings = document.createElement('div'), h3 = document.createElement('h3'), note = document.createElement('p'); card.className = 'diagram-card'; h3.textContent = voicing?.label || '開放和弦'; strings.className = 'strings'; strings.setAttribute('aria-hidden', 'true'); ['', 'E', 'A', 'D', 'G', 'B', 'e'].forEach(name => { const span = document.createElement('span'); span.textContent = name; strings.appendChild(span); }); card.append(h3, strings, renderFretboard(voicing)); if (voicing?.note) { note.className = 'diagram-note'; note.textContent = voicing.note; card.appendChild(note); } return card; }
    function selectedChord() { const selected = select.selectedOptions[0], root = selected?.dataset.root || 'C', suffix = selected?.dataset.suffix || '', quality = QUALITIES.find(item => item.suffix === suffix) || QUALITIES[0]; return buildChord(root, quality); }
    function renderChord() { const chord = selectedChord(); chordName.textContent = chord.label; chordQuality.textContent = chord.quality; difficulty.textContent = chord.difficulty; fingering.textContent = chord.fingering; tip.textContent = chord.tip; renderNotes(chord.notes); chordDiagrams.replaceChildren(diagram(chord.open), diagram(chord.closed), ...chord.others.map(diagram)); }
    buildOptions(); select.addEventListener('change', renderChord); renderChord();
  </script>
</body>
